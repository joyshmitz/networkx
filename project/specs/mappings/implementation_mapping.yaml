version: 0.2.0
mapping_id: questionnaire_to_downstream_packs

artifact_classes:
  - artifact_id: network_volume
    label_uk: Базовий інфраструктурний том
  - artifact_id: cabinet_build_pack
    label_uk: Пакет для збірки шафи і power/media fit
  - artifact_id: addressing_framework_pack
    label_uk: Адресний і naming framework
  - artifact_id: firewall_policy_intent_pack
    label_uk: Intent-пакет зонування і доступу
  - artifact_id: telemetry_transport_pack
    label_uk: Пакет транспорту для АСКОЕ/телеметрії
  - artifact_id: video_transport_pack
    label_uk: Пакет транспорту і PoE для відео
  - artifact_id: iiot_integration_pack
    label_uk: Пакет інтеграції IIoT/edge
  - artifact_id: commissioning_pack
    label_uk: Пакет FAT/SAT і ПНР
  - artifact_id: operations_handoff_pack
    label_uk: Пакет для експлуатації
  - artifact_id: asbuilt_closure_pack
    label_uk: Intended vs as-built closure pack

mappings:
  - field_id: object_id
    network_volume_sections: [scope_and_assumptions, traceability]
    downstream_consumers: [project_manager, ot_architect]
    downstream_artifacts: [network_volume, commissioning_pack, operations_handoff_pack, asbuilt_closure_pack]

  - field_id: object_name
    network_volume_sections: [scope_and_assumptions]
    downstream_consumers: [project_manager, ot_architect]
    downstream_artifacts: [network_volume, commissioning_pack, operations_handoff_pack]

  - field_id: object_type
    network_volume_sections: [scope_and_assumptions, physical_topology, adjacent_volume_interfaces]
    downstream_consumers: [ot_architect, network_engineer, telemetry_engineer, video_engineer, iiot_engineer]
    downstream_artifacts: [network_volume, addressing_framework_pack, telemetry_transport_pack, video_transport_pack, iiot_integration_pack]

  - field_id: project_stage
    network_volume_sections: [scope_and_assumptions, acceptance]
    downstream_consumers: [project_manager, commissioning_engineer]
    downstream_artifacts: [network_volume, commissioning_pack, asbuilt_closure_pack]

  - field_id: criticality_class
    network_volume_sections: [scope_and_assumptions, resilience_and_degraded_modes, security_access]
    downstream_consumers: [object_owner, ot_architect, operations_engineer]
    downstream_artifacts: [network_volume, firewall_policy_intent_pack, telemetry_transport_pack, operations_handoff_pack, commissioning_pack]

  - field_id: staffing_model
    network_volume_sections: [management_oob, resilience_and_degraded_modes, operations_model]
