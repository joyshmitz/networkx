schema_version: 0.1.0

validators:
  resilience:
    fallback_owner_roles:
      - ot_architect
    rules:
      - issue_code: physical_graph_empty
        message_contains: "Physical graph is empty"
      - issue_code: wan_edges_required
        message_contains: "requires at least two WAN edges"
        field_ids:
          - redundancy_target
      - issue_code: carrier_domains_required
        message_contains: "requires at least two carrier domains"
        field_ids:
          - carrier_diversity_target
      - issue_code: no_spof_bridges_present
        message_contains: "No-SPOF target violated"
        field_ids:
          - redundancy_target
      - issue_code: common_cause_domains_missing
        message_contains: "secondary power/cabinet domains are not modeled"
        field_ids:
          - common_cause_separation_required

  time:
    fallback_owner_roles:
      - telemetry_engineer
    rules:
      - issue_code: sync_protocol_missing
        message_contains: "sync_protocol is missing"
        field_ids:
          - sync_protocol

  semantic_consistency:
    fallback_owner_roles:
      - coordinator
    rules:
      - issue_code: timing_accuracy_requires_ptp
        message_contains: "requires PTP"
        field_ids:
          - timing_accuracy_class
          - sync_protocol
      - issue_code: high_criticality_conflicts_with_no_redundancy
        message_contains: "redundancy_target='none'"
        field_ids:
          - redundancy_target
      - issue_code: remote_ops_conflicts_with_oob_disabled
        message_contains: "without OOB"
        field_ids:
          - oob_required
      - issue_code: strict_zones_conflict_with_audit_logging_disabled
        message_contains: "audit_logging_required='yes'"
        field_ids:
          - security_zone_model
          - audit_logging_required
      - issue_code: high_criticality_conflicts_with_single_path
        message_contains: "single_path_allowed carrier diversity"
        field_ids:
          - carrier_diversity_target
      - issue_code: high_criticality_conflicts_with_best_effort
        message_contains: "best_effort degraded mode"
        field_ids:
          - degraded_mode_profile
      - issue_code: high_criticality_conflicts_with_same_day_mttr
        message_contains: "same_day MTTR"
        field_ids:
          - mttr_target_class
      - issue_code: high_criticality_conflicts_with_shared_ok
        message_contains: "shared_ok transport separation"
        field_ids:
          - transport_separation_policy
      - issue_code: high_criticality_conflicts_with_flat_zones
        message_contains: "flat zone model"
        field_ids:
          - security_zone_model
      - issue_code: poe_required_conflicts_with_no_budget
        message_contains: "poe_budget_class is set to none"
        field_ids:
          - poe_budget_class
