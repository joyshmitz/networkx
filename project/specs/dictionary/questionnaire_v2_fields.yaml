    type: enum
    strictness: S3
    required: true
    owner_role: operations_engineer
    reviewer_roles:
      - project_manager
    allowed_values_ref: yes_no_tbd
    selection_rule: Для production systems значення yes є очікуваним.
    interpretation_rule: Активує generation rules для operations handoff pack.
    unknown_policy: allowed_until_stage_gate
    evidence_required: delivery_scope
    design_impact:
      - operations
    downstream_impact:
      - operations

  - field_id: asbuilt_package_required
    label_uk: Потрібен as-built package
