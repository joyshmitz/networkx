    strictness: S2
    required: true
    owner_role: operations_engineer
    reviewer_roles:
      - object_owner
    allowed_values_ref: maintenance_window_model
    selection_rule: Обирається реальний режим зупинок/доступності об'єкта.
    interpretation_rule: Впливає на commissioning strategy і change control notes.
    unknown_policy: informational_only
    evidence_required: operating_model
    design_impact:
      - operations
    downstream_impact:
      - commissioning
      - operations

  - field_id: operations_handoff_required
    label_uk: Потрібен formal operations handoff pack
