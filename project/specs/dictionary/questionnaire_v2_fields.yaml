    strictness: S3
    required: true
    owner_role: operations_engineer
    reviewer_roles:
      - object_owner
      - project_manager
    allowed_values_ref: support_model
    selection_rule: Обирається фактична after-go-live model, не тимчасова на стадії впровадження.
    interpretation_rule: Впливає на OOB, contractor policy, MTTR і operations handoff content.
    unknown_policy: allowed_until_stage_gate
    evidence_required: operating_model
    design_impact:
      - operations
    downstream_impact:
      - operations
      - commissioning

  - field_id: maintenance_window_model
    label_uk: Модель вікон обслуговування
