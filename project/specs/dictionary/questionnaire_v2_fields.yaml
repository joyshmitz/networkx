    type: enum
    strictness: S3
    required: true
    owner_role: project_manager
    reviewer_roles:
      - commissioning_engineer
      - operations_engineer
    allowed_values_ref: yes_no_tbd
    selection_rule: Для production systems значення yes є очікуваним.
    interpretation_rule: Активує as-built closure rules і downstream closure pack.
    unknown_policy: allowed_until_stage_gate
    evidence_required: delivery_scope
    design_impact:
      - asbuilt_closure
    downstream_impact:
      - operations
      - commissioning

  - field_id: fat_required
    label_uk: Потрібен FAT
    purpose: Визначає, чи потрібен factory acceptance stage для мережевої частини.
    type: enum
    strictness: S3
    required: true
    owner_role: commissioning_engineer
    reviewer_roles:
      - object_owner
      - project_manager
    allowed_values_ref: yes_no_tbd
    selection_rule: Значення yes обирається, якщо договір, criticality або supply chain risk вимагають FAT.
    interpretation_rule: Активує commissioning pack requirements.
    unknown_policy: allowed_until_stage_gate
    evidence_required: contractual_basis
    design_impact:
      - acceptance
    downstream_impact:
      - commissioning

  - field_id: sat_required
    label_uk: Потрібен SAT
    purpose: Визначає, чи потрібен site acceptance stage для мережевої частини.
    type: enum
    strictness: S4
    required: true
    owner_role: commissioning_engineer
    reviewer_roles:
      - object_owner
